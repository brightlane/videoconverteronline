<style>
:root{
    --bg:#0f172a;
    --card:#111827;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --accent:#38bdf8;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    line-height:1.7;
}

.container{
    width:min(1100px,92%);
    margin:auto;
}

header{
    padding:40px 0;
    border-bottom:1px solid #1e293b;
}

.logo{
    font-size:2rem;
    font-weight:bold;
}

.hero{
    padding:60px 0;
}

.card{
    background:var(--card);
    padding:25px;
    border-radius:16px;
    margin-bottom:25px;
    border:1px solid #1f2937;
}

.button{
    display:inline-block;
    padding:14px 22px;
    background:var(--accent);
    color:#000;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

a{
    color:var(--accent);
    text-decoration:none;
}

footer{
    margin-top:60px;
    padding:40px 0;
    border-top:1px solid #1e293b;
    color:var(--muted);
}

ul{
    padding-left:20px;
}

.meta{
    color:var(--muted);
    font-size:.95rem;
}

        </p>

            Return Home
        </a>
    </div>
</section>

</main>

<footer>
    <div class="container">
        <p>
            © 2026 Benny Palmarino • Built for SEO & AI Discovery
